services:
  # PostgreSQL 18 Database
  db:
    image: postgres:18
    container_name: school_system_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: school_system_db_v2
      POSTGRES_USER: postgre
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgre -d school_system_db_v2"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school_system_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgre:123@db:5432/school_system_db_v2
      DATABASE_URL_SYNC: postgresql://postgre:123@db:5432/school_system_db_v2
      DEBUG: "true"
      SECRET_KEY: docker-secret-key-change-in-production
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3001,http://frontend:5173"
      PROMETHEUS_ENABLED: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # Vue 3 Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: school_system_frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_API_PROXY_TARGET: http://school_system_backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: school_system_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: school_system_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
