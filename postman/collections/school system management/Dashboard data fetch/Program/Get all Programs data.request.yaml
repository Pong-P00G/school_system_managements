scripts:
  - type: afterResponse
    code: |
      
      const jsonData = pm.response.json();

      const template = `
      <html>
      <head>
        <style>
          body {
            font-family: Arial, sans-serif;
            font-size: 13px;
            margin: 16px;
            color: #333;
          }
          h2 {
            color: #444;
            margin-bottom: 12px;
          }
          table {
            border-collapse: collapse;
            width: 100%;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
          }
          th {
            background-color: #4a90d9;
            color: #fff;
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            letter-spacing: 0.03em;
          }
          td {
            padding: 8px 12px;
            border-bottom: 1px solid #e0e0e0;
            vertical-align: top;
          }
          tr:nth-child(even) td {
            background-color: #f4f8fd;
          }
          tr:nth-child(odd) td {
            background-color: #ffffff;
          }
          tr:hover td {
            background-color: #ddeeff;
          }
          .badge-active {
            background-color: #28a745;
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
          }
          .badge-inactive {
            background-color: #dc3545;
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
          }
        </style>
      </head>
      <body>
        <h2>Departments ({{departments.length}} total)</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Code</th>
              <th>Name</th>
              <th>Description</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Active</th>
              <th>Established Date</th>
            </tr>
          </thead>
          <tbody>
            {{#each departments}}
            <tr>
              <td>{{department_id}}</td>
              <td><strong>{{department_code}}</strong></td>
              <td>{{department_name}}</td>
              <td>{{description}}</td>
              <td>{{phone}}</td>
              <td>{{email}}</td>
              <td>
                {{#if is_active}}
                  <span class="badge-active">Yes</span>
                {{else}}
                  <span class="badge-inactive">No</span>
                {{/if}}
              </td>
              <td>{{established_date}}</td>
            </tr>
            {{/each}}
          </tbody>
        </table>
      </body>
      </html>
      `;

      pm.visualizer.set(template, { departments: jsonData.departments });
    language: text/javascript
order: 1000
